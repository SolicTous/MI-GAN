env:
  allow_tf32: true
  cuda: true
  cudnn_benchmark: true
  debug: false
  gpu_count: 1
  gpu_device:
  - 0
  log_root_dir: log
  matplotlib_mode: agg
  rnd_seed: 0
  torch_version: !!python/object/new:torch.torch_version.TorchVersion
  - 2.5.1+cu124
eval:
  batch_size: 4
  batch_size_per_gpu: 4
  dataset:
    demo: false
    formatter:
      args:
        hole_range:
        - 0.0
        - 1.0
        random_flip: false
        resolution: 512
      type: FreeFormMaskFormatter
    loader:
    - args: {}
      type: DefaultLoader
    mode: val512
    name: mirflickr_val512_inpainting
    root_dir: E:/mirflickr
    super_cfg: null
    symbol: mirflickr
    type: places2
  dataset_num_workers: 4
  dataset_num_workers_per_gpu: 4
  log_dir: log\comodgan_mirflickr\177806447240_v3_s0
  log_file: log\comodgan_mirflickr\177806447240_v3_s0\train.log
model:
  symbol: comodgan
  type: comodgan_generator
model_d:
  args:
    activation: lrelu_agc(alpha=0.2, gain=sqrt_2, clamp=256)
    c_dim: null
    ch_base: 32768
    ch_max: 512
    cmap_dim: null
    ic_n: 4
    mbstd_c_n: 1
    mbstd_group_size: 4
    resample_filter:
    - 1
    - 3
    - 3
    - 1
    resolution: 512
    use_fp16_before_res: null
  name: comodgan_d512
  pretrained: null
  symbol: comodgan
  type: comodgan_discriminator
model_g:
  args:
    encoder:
      args:
        activation: lrelu_agc(alpha=0.2, gain=sqrt_2, clamp=256)
        c_dim: null
        ch_base: 32768
        ch_max: 512
        cmap_dim: null
        has_extra_final_layer: false
        ic_n: 4
        mbstd_c_n: 0
        mbstd_group_size: 0
        oc_n: 1024
        resample_filter:
        - 1
        - 3
        - 3
        - 1
        resolution: 512
        use_dropout: true
        use_fp16_before_res: null
      name: comodgan_e512
      pretrained: null
      symbol: comodgan
      type: comodgan_encoder
    mapping:
      args:
        activation: lrelu_agc(alpha=0.2, gain=sqrt_2, clamp=256)
        c_dim: 0
        embed_features: null
        layer_features: null
        lr_multiplier: 0.01
        num_layers: 8
        num_ws: 16
        w_avg_beta: 0.995
        w_dim: 512
        z_dim: 512
      name: comodgan_mapping_512
      pretrained: null
      symbol: comodgan
      type: comodgan_mapping
    synthesis:
      args:
        activation: lrelu_agc(alpha=0.2, gain=sqrt_2, clamp=256)
        ch_base: 32768
        ch_max: 512
        resample_filter:
        - 1
        - 3
        - 3
        - 1
        resolution: 512
        rgb_n: 3
        use_fp16_after_res: null
        w0_dim: 1024
        w_dim: 512
      name: comodgan_s512
      pretrained: null
      symbol: comodgan
      type: comodgan_synthesis
  name: comodgan_g512
  pretrained: null
  symbol: comodgan
  type: comodgan_generator
profile:
  active: 3
  enabled: false
  num_steps: 10
  profile_memory: true
  record_shapes: true
  save_dir: null
  wait: 1
  warmup: 2
  with_stack: true
train:
  batch_size: 2
  batch_size_per_gpu: 2
  d_opt_kwargs:
    betas:
    - 0
    - 0.99
    class_name: torch.optim.Adam
    eps: 1.0e-08
    lr: 0.001
  d_reg_interval: 16
  dataset:
    formatter:
      args:
        hole_range:
        - 0.0
        - 1.0
        random_flip: true
        resolution: 512
      type: FreeFormMaskFormatter
    loader:
    - args: {}
      type: DefaultLoader
    mode: train512
    name: mirflickr_train512_inpainting
    root_dir: E:/mirflickr
    super_cfg: null
    symbol: mirflickr
    type: places2
  dataset_num_workers: 4
  dataset_num_workers_per_gpu: 4
  ema_kimg: 20
  ema_rampup: null
  exec_stage: comodgan_default.train_stage
  experiment_id: 177806447240
  g_opt_kwargs:
    betas:
    - 0
    - 0.99
    class_name: torch.optim.Adam
    eps: 1.0e-08
    lr: 0.001
  g_reg_interval: 4
  kimg_per_tick: 4
  log_dir: log\comodgan_mirflickr\177806447240_v3_s0
  log_file: log\comodgan_mirflickr\177806447240_v3_s0\train.log
  loss_kwargs:
    pl_weight: 0
    r1_gamma: 10
  metrics:
  - fid100_full_inpainting
  save_code: true
  save_init_model: false
  signature:
  - v3
  - s0
  skip_partial_batch: true
  snapshot:
    checkpoint: 200
    evaluate: 200
    image: 200
  total_kimg: 10000
